<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homigo | Login</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="container nav-content">
        <a href="/" class="brand"><span class="brand-mark">HG</span><span class="brand-text">Homi<span>Go</span></span></a>
        <div class="nav-links" id="userActions"></div>
      </div>
    </nav>
    <main class="auth-wrapper">
      <div class="auth-card">
        <h2>Login</h2>
        <p class="muted">Login to continue as a customer or service provider.</p>
        <div id="loginMessage" class="hidden"></div>
        <form id="loginForm" class="form-grid">
          <div class="form-group full">
            <label>Email</label>
            <input name="email" type="email" required />
          </div>
          <div class="form-group full">
            <label>Password</label>
            <input name="password" type="password" required />
          </div>
          <div class="form-group full">
            <button class="btn" type="submit">Login</button>
          </div>
        </form>
      </div>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
