<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homigo | Provider Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="container nav-content">
        <a href="/" class="brand"><span class="brand-mark">HG</span><span class="brand-text">Homi<span>Go</span></span></a>
        <div class="nav-links" id="userActions"></div>
      </div>
    </nav>
    <main class="content-wrapper" id="providerDashboard">
      <div class="container split-layout">
        <aside class="sidebar">
          <h3>Provider Menu</h3>
          <button class="btn" data-provider-section="home">Home</button>
          <button class="btn-outline" data-provider-section="bookings">Bookings</button>
          <button class="btn-outline" data-provider-section="earnings">Earnings</button>
          <button class="btn-outline" data-provider-section="analytics">Analytics</button>
          <button class="btn-outline" data-provider-section="profile">Profile</button>
          <button class="btn-outline" data-provider-section="settings">Settings</button>
        </aside>
        <section id="providerContent"></section>
      </div>
    </main>

    <template id="providerProfileTemplate">
      <div id="providerProfileCard"></div>
    </template>

    <template id="providerSettingsTemplate">
      <div class="dashboard-card">
        <h3>Provider Settings</h3>
        <div id="providerSettingsMessage" class="hidden"></div>
        <form id="providerSettingsForm" class="form-grid">
          <div class="form-group">
            <label>Name</label>
            <input name="name" required />
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input name="phone" required />
          </div>
          <div class="form-group">
            <label>City</label>
            <input name="city" required />
          </div>
          <div class="form-group">
            <label>Location</label>
            <input name="location" />
          </div>
          <div class="form-group">
            <label>Service Category</label>
            <select name="serviceCategory"></select>
          </div>
          <div class="form-group">
            <label>Experience</label>
            <input name="experience" type="number" min="0" />
          </div>
          <div class="form-group">
            <label>Pricing</label>
            <input name="pricing" type="number" min="0" />
          </div>
          <div class="form-group full">
            <label>Description</label>
            <textarea name="description"></textarea>
          </div>
          <div class="form-group full">
            <button class="btn" type="submit">Save Changes</button>
          </div>
        </form>
      </div>
    </template>
    <script src="/app.js"></script>
  </body>
</html>
