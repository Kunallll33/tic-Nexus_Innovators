<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homigo | Register</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="container nav-content">
        <a href="/" class="brand">Homigo</a>
        <div class="nav-links" id="userActions"></div>
      </div>
    </nav>
    <main class="auth-wrapper">
      <div class="auth-card">
        <h2>Create Account</h2>
        <p class="muted">Register as a customer or a service provider.</p>
        <div id="registerMessage" class="hidden"></div>
        <form id="registerForm" class="form-grid">
          <div class="form-group">
            <label>Name</label>
            <input name="name" required />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input name="email" type="email" required />
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input name="phone" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input name="password" type="password" required />
          </div>
          <div class="form-group">
            <label>Role</label>
            <select id="role" name="role" required>
              <option value="customer">Customer</option>
              <option value="provider">Service Provider</option>
            </select>
          </div>
          <div class="form-group">
            <label>City</label>
            <input name="city" required />
          </div>
          <div class="form-group full">
            <label>Location</label>
            <input name="location" placeholder="Area / address" />
          </div>
          <div id="providerFields" class="form-grid full hidden">
            <div class="form-group">
              <label>Service Category</label>
              <select id="serviceCategory" name="serviceCategory"></select>
            </div>
            <div class="form-group">
              <label>Experience (years)</label>
              <input name="experience" type="number" min="0" />
            </div>
            <div class="form-group">
              <label>Pricing</label>
              <input name="pricing" type="number" min="0" />
            </div>
            <div class="form-group full">
              <label>Description</label>
              <textarea name="description"></textarea>
            </div>
          </div>
          <div class="form-group full">
            <button class="btn" type="submit">Register</button>
          </div>
        </form>
      </div>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
